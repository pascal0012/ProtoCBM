mode: XCY   # XY and XC and CY
n_attributes: 112

model_name: protocbm
concept_mapper: protomod
concept_activation: none    # "relu" or "sigmoid"

saliency_method: attention
IoU_threshold: 0.5
plot_curve: false
use_argmax: false

# Performance: Skip torch.compile() for faster model loading (5-15 second speedup)
# Set to false if you need compiled model for large batch processing (100+ images)
skip_compile: true

# Dataset selection: "cub" (default) or "sub" (SUB benchmark from HuggingFace)
dataset: cub

# Updated paths to match your directory structure
log_dir: outputs/ProtoCBM/models
data_dir: data/CUB_200_2011
split_dir: data/CUB_processed/class_attr_data_10/test.pkl

# SUB Dataset settings (only used when dataset: sub)
# Path where SUB dataset will be downloaded/loaded from
sub_data_dir: data/SUB
# Optional: limit number of SUB samples for debugging (null for full dataset)
sub_limit: null
use_majority_voting: true
save_majority_csv: false

# Checkpoint loading options (choose one):
# Option 1: Direct path to checkpoint file
# checkpoint: "outputs/ProtoCBM/models/best_model_1.pth"
# Option 2: Leave empty to auto-load from log_dir based on seed
checkpoint: outputs/ProtoCBM/models/xcy2.pth

vis_every_n: 10   # Visualize every 10th batch for comparison
# max_samples: null  # Full dataset evaluation
seed: 1  # Used when checkpoint is empty: loads best_model_1.pth from log_dir

batch_size: 64
use_aux: false

backbone: inception
backbone_pretrained: true
backbone_freeze: false
expand_dim: 0

proto_n_vectors: 1  # Model was trained with 1 vector per concept (112 total)
