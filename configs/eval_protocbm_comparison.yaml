mode: XCY   # XY and XC and CY
n_attributes: 112

model_name: protocbm
concept_mapper: protomod
concept_activation: none    # "relu" or "sigmoid"

saliency_method: attention
IoU_threshold: 0.5
plot_curve: false
use_argmax: false

# Updated paths to match your directory structure
log_dir: outputs/ProtoCBM/models
data_dir: data/CUB_200_2011
split_dir: data/CUB_processed/class_attr_data_10/test.pkl
checkpoint: ""  # Empty - let prepare_model load it

vis_every_n: 5   # Visualize every 5th batch for comparison
seed: 1  # This will load xcy1.pth from models directory

batch_size: 64
use_aux: false

backbone: inception
backbone_pretrained: true
backbone_freeze: false
expand_dim: 0

proto_n_vectors: 1  # Model was trained with 1 vector per concept (112 total)
