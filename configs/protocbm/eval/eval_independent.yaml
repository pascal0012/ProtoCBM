mode: independent
n_attributes: 112

model_name: protocbm
concept_mapper: protomod
concept_activation: sigmoid

saliency_method: attention
IoU_threshold: 0.5
plot_curve: false
use_argmax: true

log_dir: outputs/Inspection/Independent
data_dir: data/CUB_200_2011
split_dir: data/CUB_processed/class_attr_data_10/test.pkl

dataset: cub
vis_every_n: 10
seed: 1

# Independent model checkpoints
xc_checkpoint: weights/protoCBM-models/independent/xc_sigmoid.pth
cy_checkpoint: weights/protoCBM-models/independent/cy_sigmoid.pth

# SUB Dataset settings
sub_data_dir: data/SUB
sub_limit: null

batch_size: 64
use_aux: false
use_sigmoid: true  # xc_sigmoid.pth was trained with concept_activation: sigmoid

backbone: inception
backbone_pretrained: true
backbone_freeze: false
expand_dim: 0
proto_n_vectors: 1
