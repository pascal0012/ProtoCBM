mode: XCY   # XY and XC and CY
n_attributes: 112

model_name: protocbm
concept_mapper: protomod
concept_activation: none    # "relu" or "sigmoid"

log_dir: outputs/ProtoCBM
image_dir: data/CUB_200_2011/images
data_dir: data/CUB_processed/class_attr_data_10
checkpoint: ""
seed: 1

epochs: 50
batch_size: 64
lr: 0.01
optimizer: sgd
scheduler_step: 1000
weight_decay: 0.00004
use_aux: true

backbone: inception
backbone_pretrained: true
backbone_freeze: false
expand_dim: 0

# ProtoCBM specifics
proto_n_vectors: 1
loss_weight_attribute_reg: 1.0
loss_weight_map_compactness: 0.1
loss_weight_attribute_decorrelation: 4e-2
loss_decorrelation_per_group: true
