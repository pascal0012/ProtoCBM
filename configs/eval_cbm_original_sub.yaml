mode: XCY   # XY and XC and CY
n_attributes: 112

model_name: cbm
concept_mapper: cbm
concept_activation: none    # "relu" or "sigmoid"

saliency_method: cam
IoU_threshold: 0.5
plot_curve: false
use_argmax: False

# Performance: Skip torch.compile() for faster model loading
skip_compile: true

# Dataset selection
dataset: sub

# Updated paths - output to separate folder for original CBM
log_dir: outputs/CBM-original
data_dir: data/CUB_200_2011
split_dir: data/CUB_processed/class_attr_data_10/test.pkl

# SUB Dataset settings
sub_data_dir: data/SUB
sub_limit: null

# Checkpoint path - original CBM model from ConceptBottleneck
weight_dir: weights/best_model_3.pth
checkpoint: ""

seed: 3

batch_size: 64
use_aux: false

backbone: inception
backbone_pretrained: true
backbone_freeze: false
expand_dim: 0

no_img: False
use_attr: True
bottleneck: True