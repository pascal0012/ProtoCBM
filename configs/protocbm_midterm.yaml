n_attributes: 112

model_name: protocbm
concept_mapper: protomod
concept_activation: none    # "relu" or "sigmoid"

image_dir: data/CUB_200_2011/images
data_dir: data/CUB_processed/class_attr_data_10
seed: 1

epochs: 2 # 1000
batch_size: 64
lr: 0.001
optimizer: sgd
scheduler_step: 20
weight_decay: 0.00004
use_aux: true

backbone: inception
backbone_pretrained: true
backbone_freeze: false
expand_dim: 0

# ProtoCBM specifics
proto_n_vectors: 1
loss_decorrelation_per_group: true
